<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LED Control</title>

  <script src="lib/Util.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.1.4/pixi.min.js"></script>

  <script src="js/LEDInterface.min.js"></script>
</head>
<body style="background-color: black; margin: 0; padding: 0; overflow: hidden">
<div id="pixi">

</div>

<div>
  <div style="width: 200px; margin: auto">
    <h3 style="color: aqua">Color Picker</h3>
    <input style="width: 200px" type="color" id="colorPicker" value="#ff0000">

    <h3 style="color: aqua">Brightness</h3>
    <input style="width: 100px" type="range" id="brightnessSlider" min="1" max="100" value="100">
  </div>
</div>
</body>
</html>
